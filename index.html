<!DOCTYPE html>
<html>
<head>
  <title>My Scratch Game</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    #game {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    #rotate {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<div id="rotate">
  Please rotate your phone to landscape mode 🎮
</div>

<iframe id="game"
src="https://scratch.mit.edu/projects/1305602946/embed">
</iframe>

<script>
function checkOrientation() {
  if (window.innerWidth > window.innerHeight) {
    document.getElementById("rotate").style.display = "none";
    document.getElementById("game").style.display = "block";
  } else {
    document.getElementById("rotate").style.display = "flex";
    document.getElementById("game").style.display = "none";
  }
}

window.addEventListener("resize", checkOrientation);
window.addEventListener("load", checkOrientation);
</script>

</body>
</html>
